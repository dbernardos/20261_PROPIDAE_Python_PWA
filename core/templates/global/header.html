<header class="main-header-container">
    <div class="main-header container">
        <h1>
            <a class="main-logo" href="{% url 'urlindex' %}">
                <i class="fas fa-regular fa-bag-shopping main-logo-icon"></i>
                <span class="main-logo-text">Loja Online</span>
            </a>
        </h1>

        <div class="boasvindas">
            {% if user.is_authenticated %}
                <span class="text-welcome">Bem vindo, {{ user.username }}</span>
                <i class="fa-solid fa-cart-shopping"></i>
            {% endif %}
        </div>
    </div>
</header>
